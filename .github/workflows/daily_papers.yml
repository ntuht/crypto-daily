name: Daily Paper Update

on:
  # Run every day at UTC 01:00 (Beijing 09:00)
  schedule:
    - cron: '0 1 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Create config.yaml
        run: |
          cat > config.yaml <<EOF
          survey:
            bark_key: "${{ secrets.BARK_KEY }}"
            site_base_url: "https://ntuht.github.io/crypto-daily"
            push_enabled: true
          EOF

      - name: Run daily pipeline
        env:
          PYTHONIOENCODING: utf-8
        run: python survey/scripts/daily_pipeline.py --no-download

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force survey/papers.yaml survey/OVERVIEW.md survey/scripts/.fetch_log.json || true
          git add survey/reports/ survey/weekly_reports/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📄 Daily paper update $(date +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./survey/site
          publish_branch: gh-pages
