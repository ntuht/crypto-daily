name: Daily Paper Update

on:
  # Run every day at UTC 00:00 (Beijing 08:00)
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml google-genai

      - name: Create config.yaml
        run: |
          cat > config.yaml <<EOF
          survey:
            bark_key: "${{ secrets.BARK_KEY }}"
            site_base_url: "https://ntuht.github.io/crypto-daily"
            push_enabled: true
            digest:
              max_papers: 10
              detailed_count: 3
          llm:
            provider: gemini
            api_key: "${{ secrets.GEMINI_API_KEY }}"
            model: gemini-2.5-flash
            temperature: 0.3
            max_tokens: 8192
          EOF

      - name: Run daily pipeline
        env:
          PYTHONIOENCODING: utf-8
        run: python survey/scripts/daily_pipeline.py --no-download --no-deploy

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force survey/papers.yaml survey/OVERVIEW.md survey/references.bib || true
          git add survey/reports/ survey/backlog.yaml || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📄 Daily paper update $(date +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./survey/site
          publish_branch: gh-pages

      - name: Bark push notification
        if: always()
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -n "$BARK_KEY" ]; then
            python survey/scripts/push_notify.py \
              --title "📄 每日论文已更新" \
              --body "查看今日精选 $DATE" \
              --url "https://ntuht.github.io/crypto-daily/daily/$DATE.html" \
              --bark-key "$BARK_KEY"
          else
            echo "BARK_KEY not set, skipping push"
          fi
