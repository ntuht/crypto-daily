<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日论文报告</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-card: #1e1e3a;
      --accent-light: #8b83ff;
      --text-primary: #e8e8f0;
      --text-secondary: #a0a0c0;
      --border: #2a2a4a;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Consolas', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-main);
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 32px 16px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent-light), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
    .back { color: var(--accent-light); text-decoration: none; font-size: 0.9rem; }
    .back:hover { text-decoration: underline; }
    .report-link {
      display: block;
      padding: 14px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .report-link:hover {
      border-color: var(--accent-light);
      transform: translateX(4px);
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="../index.html">← 返回论文库</a>
    <h1>📄 每日论文报告</h1>

    <a class="report-link" href="2026-03-07.html">2026-03-07</a>
    <a class="report-link" href="2026-03-04.html">2026-03-04</a>
    <a class="report-link" href="2026-03-03.html">2026-03-03</a>

  </div>
</body>
</html>
